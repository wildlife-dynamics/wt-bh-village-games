# ══════════════════════════════════════════════════════════════════════════════
# Bahari Hai — Village Games param.yaml
# ══════════════════════════════════════════════════════════════════════════════

wf_details:
  name: "wt_bh_village_games"

time_range:
  timezone:
    label: UTC
    tzCode: UTC
    name: UTC
    utc: '+03:00'
  time_format: '%d %b %Y %H:%M:%S'
  since: '2024-01-01T00:00:00.000Z'
  until: '2024-12-31T23:59:00.000Z'

# CSV patrol data
csv_input:
  input_method:
    file_path: "/mnt/d/pgaff/ecoscope-pgaff/BAHARI_HAI/patrol_findings_with_village.csv"

# Icons directory — should contain:
#   green_thumb.png, red_thumb.png       (feedback tables)
#   boat.png, happy.png, sad.png         (leaderboards)
#   turtle_poaching.png, mangrove_logging.png,
#   illegal_fishing.png, arrests.png,
#   poached_turtle_sum.png               (icon bars)
icons_input:
  input_method:
    file_path: "/mnt/d/pgaff/ecoscope-pgaff/BAHARI_HAI/icons"

# Marine layers for ecomaps
marine_layers_input:
  input_method:
    file_path: "/mnt/d/pgaff/ecoscope-pgaff/BAHARI_HAI/marine_layers"

# Report template (Word .docx)
report_template_input:
  input_method:
    file_path: "/mnt/d/pgaff/ecoscope-pgaff/BAHARI_HAI/BH_REPORTS/bahari_hai_village_games_report_template.docx"

