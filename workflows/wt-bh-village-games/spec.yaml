    version: ">=0.19.4"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  - name: ecoscope-workflows-ext-ecoscope
    version: "*"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  - name: ecoscope-workflows-ext-custom
    version: "0.0.28.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  - name: ecoscope-workflows-ext-bahari-hai
    version: "==0.0.16"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  - name: ecoscope-workflows-ext-bh-village-games
    version: "0.0.3"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  - name: ecoscope-workflows-ext-ste
    version: "0.0.18.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  - name: pandas
    version: ">=1.5.0"
    channel: conda-forge
  - name: pandera
    version: "0.26.0"
    channel: conda-forge
  - name: geopandas
    version: ">=0.13.0"
    channel: conda-forge
  - name: docxtpl
    version: ">=0.16"
    channel: conda-forge
  - name: matplotlib
    version: ">=3.7.0"
    channel: conda-forge
  - name: plotly
    version: ">=5.0.0"
    channel: conda-forge
  - name: fiona
    version: ">=1.9.0"
    channel: conda-forge

# rjsf-overrides:
#   $defs:
#     ValueGrouper.properties.index_name.oneOf:
#       - const: Year
#         title: Year
#       - const: Quarter
#         title: Quarter

workflow:

  # ── Workflow meta ─────────────────────────────────────────
  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Time Range
    id: time_range
    task: set_time_range

  # ── Inputs ────────────────────────────────────────────────
  - name: CSV input from CSV
    id: csv_input
    task: get_file_path
    partial:
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}

  - name: Load data
    id: load_data
    task: load_df
    partial:
      file_path: ${{ workflow.csv_input.return }}
      layer: landDx_polygons
      deserialize_json: false

  - name: Icons directory
    id: icons_input
    task: get_file_path
    partial:
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}

  - name: Marine layers path
    id: marine_layers_input
    task: get_file_path
    partial:
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}

  - name: Report template
    id: report_template_input
    task: get_file_path
    partial:
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}

  # ── Clean data ────────────────────────────────────────────
  - name: Clean patrol data
    id: clean_data
    task: clean_dataframe
    partial:
      data: ${{ workflow.load_data.return }}
      date_columns:
        - "Patrol Start Date"
        - "Waypoint Date"
      date_format: "%d-%b-%y"
      groupby_period:
        - "Year"
        - "Quarter"
      numeric_columns:
        - "X"
        - "Y"
      drop_duplicates: false

  # ── Groupers & split ──────────────────────────────────────
  - name: Yearly groupers
    id: yearly_groupers
    task: set_groupers
    partial:
      groupers:
        - index_name: Year

  - name: Quarterly groupers
    id: quarterly_groupers
    task: set_groupers
    partial:
      groupers:
        - index_name: Quarter

  - name: Split by year
    id: split_yearly
    task: split_groups
    partial:
      df: ${{ workflow.clean_data.return }}
      groupers: ${{ workflow.yearly_groupers.return }}

  - name: Split by quarter
    id: split_quarterly
    task: split_groups
    partial:
      df: ${{ workflow.clean_data.return }}
      groupers: ${{ workflow.quarterly_groupers.return }}

  # ════════════════════════════════════════════════════════════
  # SECTION 1 — COMMUNITY FEEDBACK TABLES (yearly)
  # ════════════════════════════════════════════════════════════

  - name: Feedback table - poaching
    id: tbl_poaching
    task: draw_community_feedback_table
    partial:
      df: ${{ workflow.clean_data.return }}
      activity_key: "poaching"
      icons_dir: ${{ workflow.icons_input.return }}
      station_column: "Station"
      village_column: "Village"
      low_threshold: 12      # ← hides from UI
      high_threshold: 30     # ← hides from UI
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_yearly.return }}

  - name: Persist feedback - poaching
    id: persist_tbl_poaching
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: feedback_poaching
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.tbl_poaching.return }}

  - name: poaching table png
    id: png_tbl_poaching
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1
    mapvalues:
      argnames: html_path
      argvalues: ${{ workflow.persist_tbl_poaching.return }}

  - name: Widget feedback - poaching
    id: widget_tbl_poaching
    task: create_plot_widget_single_view
    partial:
      title: "Feedback: Poaching"
    mapvalues:
      argnames: data
      argvalues: ${{ workflow.persist_tbl_poaching.return }}

  - name: Feedback table - mangrove
